name: CI/CD

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build platform shell
        run: pnpm --filter @samai/platform-shell build
        env:
          REACT_APP_API_URL: https://app-setter.digitalmarketingservicesnewyork.com
          DISABLE_ESLINT_PLUGIN: true

      - name: Build appointment-setter app
        run: pnpm --filter @samai/appointment-setter-app build
        env:
          REACT_APP_API_URL: https://app-setter.digitalmarketingservicesnewyork.com
          DISABLE_ESLINT_PLUGIN: true

      - name: Build chatbot-agents app
        run: pnpm --filter @samai/chatbot-agents-app build
        env:
          REACT_APP_API_URL: https://app-setter.digitalmarketingservicesnewyork.com
          DISABLE_ESLINT_PLUGIN: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy to S3
        run: |
          aws s3 sync ./apps/platform-shell/build s3://${{ secrets.AWS_S3_BUCKET }}/dev --delete --exclude "app/*"
          aws s3 sync ./apps/appointment-setter/build s3://${{ secrets.AWS_S3_BUCKET }}/dev/app/appointment-setter --delete
          aws s3 sync ./apps/chatbot-agents/build s3://${{ secrets.AWS_S3_BUCKET }}/dev/app/chatbot-agents --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  deploy-prod:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build platform shell
        run: pnpm --filter @samai/platform-shell build
        env:
          REACT_APP_API_URL: https://api.samairep.com
          DISABLE_ESLINT_PLUGIN: true

      - name: Build appointment-setter app
        run: pnpm --filter @samai/appointment-setter-app build
        env:
          REACT_APP_API_URL: https://api.samairep.com
          DISABLE_ESLINT_PLUGIN: true

      - name: Build chatbot-agents app
        run: pnpm --filter @samai/chatbot-agents-app build
        env:
          REACT_APP_API_URL: https://api.samairep.com
          DISABLE_ESLINT_PLUGIN: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Deploy to S3
        run: |
          aws s3 sync ./apps/platform-shell/build s3://${{ secrets.AWS_S3_BUCKET }}/prod --delete --exclude "app/*"
          aws s3 sync ./apps/appointment-setter/build s3://${{ secrets.AWS_S3_BUCKET }}/prod/app/appointment-setter --delete
          aws s3 sync ./apps/chatbot-agents/build s3://${{ secrets.AWS_S3_BUCKET }}/prod/app/chatbot-agents --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
